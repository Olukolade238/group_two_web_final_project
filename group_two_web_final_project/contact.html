<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Group Two" />
    <meta
      name="description"
      content="Scoot is a technology-driven electric scooter rental company that makes urban transportation simple, accessible, and sustainable."
    />
    <meta name="keywords" content="html, css, web, web development, scooter" />
    <link rel="icon" href="./assets/media/favicon.png" type="image/x-icon" />
    <title>Scoot | Contact</title>
    <link rel="stylesheet" href="./assets/styles/contact.css" media="all" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header id="top">
      <div class="container header-container">
        <div class="logo-container">
          <a href="./index.html" title="Home">
            <img class="logo" src="./assets/media/images/logo.svg" alt="Scoot logo" />
          </a>
        </div>
        <nav>
          <ul class="navigation-links">
            <li>
              <a href="index.html">Home</a>
            </li>
            <li>
              <a href="about.html">About</a>
            </li>
            <li>
              <a href="careers.html">Careers</a>
            </li>
          </ul>
        </nav>
        <a href="coming-soon.html" type="button" class="button" id="header-button"> Get Scootin </a>
      </div>
    </header>
    <main>
      <div class="section-container">
        <section class="contact-hero-section">
          <div class="container">
            <h1>Contact</h1>
          </div>
        </section>
        <section class="contact-section">
          <div class="container">
            <h2>Submit a help request and we’ll get in touch shortly.</h2>
            <div class="contact-info">
              <form>
                <div class="form-content">
                  <p>
                    <label for="name"></label>
                    <input id="name" name="name" type="text" placeholder="Name *" autocomplete="name" required />
                  </p>
                  <p>
                    <label for="email"></label>
                    <input id="email" name="email" type="email" placeholder="Email *" autocomplete="email" required />
                  </p>
                  <p>
                    <label for="company-name"></label>
                    <input id="company-name" name="company-name" type="text" placeholder="Company Name *" required />
                  </p>
                  <p>
                    <label for="title"></label>
                    <input id="title" name="title" type="text" placeholder="Title/Subject *" required />
                  </p>
                  <p>
                    <label for="message"></label>
                    <textarea id="message" name="message" placeholder="Message *" rows="4" required></textarea>
                  </p>
                </div>
                <p class="form-check">
                  <input id="updates" name="updates" type="checkbox" />
                  <label for="updates"> Stay up-to-date with Scoot news, announcements and updates to our app </label>
                </p>
                <button class="form-btn button" type="submit">Submit</button>
              </form>
              <div class="location">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5148.943714253479!2d-97.19276479999999!3d49.81479610000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x52ea756d66476bc9%3A0x73576e4062f5fd81!2s130%20Henlow%20Bay%2C%20Winnipeg%2C%20MB%20R3Y%201G4!5e0!3m2!1sen!2sca!4v1771023602949!5m2!1sen!2sca"
                  style="border: 0"
                  allowfullscreen=""
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
                <div class="info">
                  <ul class="socials">
                    <li>
                      <a href="mailto:getyourscoot@mail.com" title="Email"> <i class="fa-solid fa-envelope"></i> </a>
                    </li>
                    <li>
                      <a href="#" title="Facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                      </a>
                    </li>
                    <li>
                      <a href="#" title="Twitter">
                        <i class="fa-brands fa-twitter"></i>
                      </a>
                    </li>
                    <li>
                      <a href="#" title="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                      </a>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="page-link-section">
          <div class="container page-link-content">
            <h2>Want to know more about us?</h2>
            <a class="button" href="./about.html">About Us</a>
          </div>
        </section>
      </div>
      <a href="#top">
        <p class="top-button">Back to top</p>
      </a>
    </main>
    <footer>
      <div class="container footer-container">
        <div class="logo-container">
          <a href="./index.html" title="Home">
            <img class="logo" src="./assets/media/images/logo.svg" alt="Scoot logo" />
          </a>
        </div>
        <nav>
          <ul id="footer-links" class="navigation-links">
            <li>
              <a href="index.html">Home</a>
            </li>
            <li>
              <a href="about.html">About</a>
            </li>
            <li>
              <a href="contact.html">Contact</a>
            </li>
            <li>
              <a href="careers.html">Careers</a>
            </li>
          </ul>
        </nav>
        <ul class="socials-icon">
          <li>
            <a href="#">
              <i class="fa-brands fa-facebook-f"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-brands fa-twitter"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-brands fa-instagram"></i>
            </a>
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
